services:
  backend:
    build:
      context: ..
      dockerfile: ./services/backend
  database:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
  redis:
    image: redis:8-alpine
    restart: always
    volumes:
      - redis_data:/data
    ports:
      - 6379:6379
    command: redis-server --requirepass ${REDIS_PASSWORD}

volumes:
  postgres_data:
  redis_data:

 
