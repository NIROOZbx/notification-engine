server:
  http_addr: ":8080"
  read_timeout: "10s"
  write_timeout: "30s"
  idle_timeout: "60s"
grpc:
  grpc_addr: "billing-service:50051"
log:
  level: "debug"
  file: "logs/app.log"
  max_size_mb: 100
  max_backups: 3
  max_age_days: 7

database:
  max_open_conns: 50
  min_open_conns: 25
  max_idle_conns: 25
  max_conn_lifetime: "30m"
  max_idle_time: "5m"

rate_limit:
  requests_per_minute: 100
  burst: 20

redis:
  addr: "redis:6379"

auth:
  access_expiry_minutes: 15
  refresh_expiry_hours: 168
  environment: development
  frontend_url: "http://localhost:5173"

cors:
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "http://localhost:5174"
